name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "core/**"
      - "native/**"
      - "js/**"
      - "wasm/**"
      - "scripts/**"
      - "flake.nix"
      - "flake.lock"
      - "package.nix"
      - "moon.mod.json"
      - "moon.pkg"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "cli/**"
      - "core/**"
      - "native/**"
      - "js/**"
      - "wasm/**"
      - "scripts/**"
      - "flake.nix"
      - "flake.lock"
      - "package.nix"
      - "moon.mod.json"
      - "moon.pkg"
      - ".github/workflows/**"

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: moon fmt/check
        run: nix develop --command moon check --target native --deny-warn --fmt

      - name: moon test
        run: nix develop --command moon test --target native --no-render

      - name: wasm-gc check
        run: nix develop --command moon check --target wasm-gc

      - name: js check
        run: nix develop --command moon check --target js

      - name: e2e test
        run: nix develop --command bash scripts/e2e.sh

      - name: benchmark smoke
        run: nix develop --command env MCPX_BENCH_ENFORCE=1 MCPX_BENCH_CLI_RUNS=5 MCPX_BENCH_MEMORY_RUNS=3 bash scripts/benchmark.sh

      - name: nix build
        run: nix build --no-link --print-out-paths

  action-timeline:
    name: Show workflow timeline
    needs: test
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@a7eaabf426cdae26c3582c3fa674b897170dec8f # v2.2.4
