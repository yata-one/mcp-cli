name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.asset_suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            asset_suffix: linux-x64
          - runner: macos-14
            asset_suffix: macos-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify
        run: |
          set -euxo pipefail
          nix develop --command moon check --target native --deny-warn --fmt
          nix develop --command moon test --target native --no-render
          nix develop --command bash scripts/e2e.sh
          nix develop --command env MCPX_BENCH_ENFORCE=1 MCPX_BENCH_CLI_RUNS=5 MCPX_BENCH_MEMORY_RUNS=3 bash scripts/benchmark.sh

      - name: Build native release
        run: |
          set -euxo pipefail
          nix build --out-link result

      - name: Package
        run: |
          set -euxo pipefail
          version="${GITHUB_REF_NAME}"
          asset="mcpx-${version}-${{ matrix.asset_suffix }}.tar.gz"
          mkdir -p dist
          cp result/bin/mcpx dist/mcpx
          chmod +x dist/mcpx
          tar -czf "$asset" -C dist mcpx
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          set -euxo pipefail
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true

  action-timeline:
    name: Show workflow timeline
    needs: release
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@a7eaabf426cdae26c3582c3fa674b897170dec8f # v2.2.4
